name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run library and sample build
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Verify build artifacts
        run: |
          test -f sample/dist/index.html
          test -f sample/dist/search-index.json
          test -f sample/dist/site-data.json

      - name: Verify package contents
        run: npm pack --dry-run
