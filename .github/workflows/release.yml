name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag
        run: node scripts/verify-release-tag.mjs "${GITHUB_REF_NAME}"

      - name: Run CI checks
        run: |
          npm run check
          npm test
          npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public --provenance
